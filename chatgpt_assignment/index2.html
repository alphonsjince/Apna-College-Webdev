<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="navbar">Admin Dashboard</div>
        <div class="sidebar">
            <p><i class="fa-solid fa-chart-pie "></i>Dashboard</p>
            <p><i class="fa-solid fa-user"></i>Users</p>
            <p><i class="fa-solid fa-chart-line"></i>Analytics</p>
            <p><i class="fa-solid fa-wallet"></i>Income</p>
            <p><i class="fa-solid fa-gear"></i>Settings</p>
            <span><i class="fa-solid fa-arrow-right-from-bracket" style="font-size: 20px;"></i>Logout</span>
        </div>
        <div class="card1">
            <p style="color: #1E3A8A;;">Total Users</p>
            <p style="color: #2563EB;">12,450</p>
        </div>
        <div class="card2">
            <p style="color: #14532D;">Revenue</p>
            <p style="color: #16A34A;">$250000</p>
        </div>
        <div class="card3">
            <p style="color: #92400E;">Orders</p>
            <p style="color: #F59E0B;">12000</p>
        </div>
        <div class="card4">
            <p style="color: #6B21A8;">Visitors</p>
            <p style="color: #9333EA;">60000</p>
        </div>
        <div class="chart">
            <div class="axis">
                <div class="graph1"></div>
                <div class="graph2"></div>
                <div class="graph3"></div>
                <div class="graph4"></div>
            </div>
        </div>
        <div class="activity">
            <div class="heading">Recent Activities</div>
            <div class="updates">
                <p>John joined</p>
                <p>Order #145 completed</p>
                <p>New user signup</p>
                <p>Income updated</p>
                <p>August joined</p>
                <p>Order #132 pending</p>
                <p>Account Updated</p>
                <p>Revenue updated</p>
            </div>
        </div>
    </div>
</body>
</html>
